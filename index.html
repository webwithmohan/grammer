<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        .container {
            margin: 10px;
        }

        p {
            font-size: 20px;
            margin-top: 10px;
        }

        h1 {
            text-align: center;
        }
        main{
            background-color: rgb(199, 244, 202);
            padding: 10px;
            border-radius: 10px;
        }
        main:nth-child(3){
            background-color: rgb(165, 153, 234);
            margin-top: 10px;

        }
        .btns{
            background-color: rgb(219, 234, 239);
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 10px;
        }
        
        button{
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 5px;
            width: 100px;
            height: 40px;
        }
        .cancelBtn{
            background-color: red;
            color: white;
            font-weight: bold;
        }
         .goBtn{
            background-color: rgb(13, 227, 109);
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Grammer</h1>
        <main>
            <h3>Vocabulary</h3>
            <p>1.Pity --> வணக்கம்</p>
            <p>2.Hell</p>
            <p>3.curse</p>
            <p>4.Stink</p>
        </main>
        <main>
            <h3>Verbs</h3>
            <p>1.Writing</p>
            <p>2.Eating</p>
            <p>3.Playing</p>
            <p>4.Running</p>
        </main>
        <div class="btns">
            <button class="cancelBtn">Cancel</button>
            <button class="goBtn">Go</button>
        </div>
    </div>
</body>

</html>
